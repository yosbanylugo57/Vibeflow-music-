<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 1200px;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .search-container {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .search-box {
            display: flex;
            gap: 10px;
            width: 100%;
            max-width: 500px;
        }

        .search-box input {
            flex: 1;
            padding: 12px 15px;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.95);
            color: #333;
            transition: all 0.3s ease;
        }

        .search-box input:focus {
            outline: none;
            background: white;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
        }

        .search-box button {
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            background: #ff6b6b;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1rem;
        }

        .search-box button:hover {
            background: #ff5252;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.4);
        }

        .search-box button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .unit-toggle {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .unit-btn {
            padding: 10px 20px;
            border: 2px solid white;
            background: transparent;
            color: white;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .unit-btn.active {
            background: white;
            color: #667eea;
        }

        .unit-btn:hover {
            transform: translateY(-2px);
        }

        .current-weather {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 25px;
            padding: 40px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .current-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .location-info h2 {
            font-size: 2rem;
            color: #333;
            margin-bottom: 5px;
        }

        .location-info p {
            color: #666;
            font-size: 0.95rem;
        }

        .weather-icon {
            width: 100px;
            height: 100px;
            font-size: 100px;
        }

        .current-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .detail-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .detail-box:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .detail-box .label {
            font-size: 0.85rem;
            opacity: 0.9;
            margin-bottom: 5px;
        }

        .detail-box .value {
            font-size: 1.8rem;
            font-weight: bold;
        }

        .description {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            color: #333;
            font-size: 1.1rem;
            text-transform: capitalize;
            margin-bottom: 20px;
        }

        .forecast {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .forecast-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            animation: slideIn 0.5s ease;
        }

        .forecast-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        }

        .forecast-card h4 {
            color: #333;
            margin-bottom: 10px;
        }

        .forecast-icon {
            font-size: 50px;
            margin: 10px 0;
        }

        .forecast-temp {
            display: flex;
            justify-content: space-around;
            margin: 10px 0;
            color: #666;
        }

        .forecast-temp .high {
            font-weight: bold;
            color: #ff6b6b;
        }

        .forecast-temp .low {
            color: #4ecdc4;
        }

        .forecast-condition {
            font-size: 0.9rem;
            color: #999;
            text-transform: capitalize;
            margin-top: 8px;
        }

        .error-message {
            background: #ff6b6b;
            color: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            animation: slideIn 0.3s ease;
        }

        .loading {
            text-align: center;
            color: white;
            padding: 40px;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 4px solid white;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .favorites {
            margin-bottom: 30px;
        }

        .favorites h3 {
            color: white;
            margin-bottom: 15px;
            font-size: 1.2rem;
        }

        .favorite-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .favorite-btn {
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid white;
            color: white;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .favorite-btn:hover {
            background: white;
            color: #667eea;
        }

        .add-favorite {
            padding: 10px 15px;
            background: #ff6b6b;
            border: none;
            color: white;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
            font-weight: bold;
        }

        .add-favorite:hover {
            background: #ff5252;
            transform: translateY(-2px);
        }

        .no-data {
            text-align: center;
            color: #999;
            padding: 40px;
            font-size: 1.1rem;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8rem;
            }

            .current-weather {
                padding: 20px;
            }

            .current-header {
                flex-direction: column;
                align-items: center;
            }

            .location-info {
                text-align: center;
            }

            .weather-icon {
                width: 80px;
                height: 80px;
                font-size: 80px;
            }

            .current-details {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌤️ Weather Dashboard</h1>
            <p>Get real-time weather information for any location</p>
        </div>

        <div class="search-container">
            <div class="search-box">
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="Enter city name (e.g., New York, London, Tokyo)..."
                    autocomplete="off"
                >
                <button onclick="searchWeather()">Search</button>
            </div>
            <div class="unit-toggle">
                <button class="unit-btn active" onclick="setUnit('metric')">°C / km/h</button>
                <button class="unit-btn" onclick="setUnit('imperial')">°F / mph</button>
            </div>
        </div>

        <div class="favorites" id="favoritesContainer" style="display: none;">
            <h3>⭐ Favorite Cities</h3>
            <div class="favorite-buttons" id="favoriteButtons"></div>
        </div>

        <div id="content"></div>
    </div>

    <script>
        let currentUnit = 'metric';
        let favorites = JSON.parse(localStorage.getItem('weatherFavorites')) || [];
        let currentCity = '';

        const API_KEY = '5fd1fddebf2e7a2eefef4a1d60cfc689';
        const BASE_URL = 'https://api.openweathermap.org/data/2.5';

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            updateFavorites();
            document.getElementById('searchInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') searchWeather();
            });
            // Load default city
            searchWeatherByCity('London');
        });

        function setUnit(unit) {
            currentUnit = unit;
            document.querySelectorAll('.unit-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            if (currentCity) {
                searchWeatherByCity(currentCity);
            }
        }

        function searchWeather() {
            const city = document.getElementById('searchInput').value.trim();
            if (city) {
                searchWeatherByCity(city);
                document.getElementById('searchInput').value = '';
            }
        }

        function searchWeatherByCity(city) {
            currentCity = city;
            showLoading();
            
            Promise.all([
                fetch(`${BASE_URL}/weather?q=${city}&appid=${API_KEY}&units=${currentUnit}`),
                fetch(`${BASE_URL}/forecast?q=${city}&appid=${API_KEY}&units=${currentUnit}`)
            ])
            .then(responses => Promise.all(responses.map(r => r.json())))
            .then(([weatherData, forecastData]) => {
                if (weatherData.cod === 200 && forecastData.cod === '200') {
                    displayCurrentWeather(weatherData);
                    displayForecast(forecastData);
                } else {
                    showError('City not found. Please try again.');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                showError('Failed to fetch weather data. Please try again.');
            });
        }

        function displayCurrentWeather(data) {
            const { name, sys, main, weather, wind, clouds, visibility } = data;
            const tempUnit = currentUnit === 'metric' ? '°C' : '°F';
            const speedUnit = currentUnit === 'metric' ? 'km/h' : 'mph';
            const windSpeed = currentUnit === 'metric' ? wind.speed : wind.speed * 2.237;

            const weatherIcon = getWeatherEmoji(weather[0].main);
            const currentTime = new Date().toLocaleString();

            const content = `
                <div class="current-weather">
                    <div class="current-header">
                        <div class="location-info">
                            <h2>${name}, ${sys.country}</h2>
                            <p>${currentTime}</p>
                        </div>
                        <div class="weather-icon">${weatherIcon}</div>
                    </div>

                    <div class="description">${weather[0].description}</div>

                    <div class="current-details">
                        <div class="detail-box">
                            <div class="label">Temperature</div>
                            <div class="value">${Math.round(main.temp)}${tempUnit}</div>
                            <div class="label">Feels Like: ${Math.round(main.feels_like)}${tempUnit}</div>
                        </div>
                        <div class="detail-box">
                            <div class="label">Humidity</div>
                            <div class="value">${main.humidity}%</div>
                        </div>
                        <div class="detail-box">
                            <div class="label">Pressure</div>
                            <div class="value">${main.pressure} mb</div>
                        </div>
                        <div class="detail-box">
                            <div class="label">Wind Speed</div>
                            <div class="value">${Math.round(windSpeed)} ${speedUnit}</div>
                        </div>
                        <div class="detail-box">
                            <div class="label">Cloudiness</div>
                            <div class="value">${clouds.all}%</div>
                        </div>
                        <div class="detail-box">
                            <div class="label">Visibility</div>
                            <div class="value">${(visibility / 1000).toFixed(1)} km</div>
                        </div>
                    </div>

                    <button class="add-favorite" onclick="addToFavorites('${name}', '${sys.country}')">
                        ⭐ Add to Favorites
                    </button>
                </div>
            `;

            document.getElementById('content').innerHTML = content;
        }

        function displayForecast(data) {
            const tempUnit = currentUnit === 'metric' ? '°C' : '°F';
            const forecastList = data.list.filter((item, index) => index % 8 === 0).slice(0, 5);

            const forecastHTML = `
                <h2 style="color: white; margin-bottom: 20px;">5-Day Forecast</h2>
                <div class="forecast">
                    ${forecastList.map(day => {
                        const date = new Date(day.dt * 1000);
                        const dayName = date.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
                        const icon = getWeatherEmoji(day.weather[0].main);
                        return `
                            <div class="forecast-card">
                                <h4>${dayName}</h4>
                                <div class="forecast-icon">${icon}</div>
                                <div class="forecast-temp">
                                    <span class="high">High: ${Math.round(day.main.temp_max)}${tempUnit}</span>
                                    <span class="low">Low: ${Math.round(day.main.temp_min)}${tempUnit}</span>
                                </div>
                                <div class="forecast-condition">${day.weather[0].description}</div>
                                <div class="forecast-condition">💧 ${day.main.humidity}% Humidity</div>
                            </div>
                        `;
                    }).join('')}
                </div>
            `;

            document.getElementById('content').innerHTML += forecastHTML;
        }

        function getWeatherEmoji(weatherType) {
            const weatherEmojis = {
                'Clear': '☀️',
                'Clouds': '☁️',
                'Rain': '🌧️',
                'Drizzle': '🌦️',
                'Thunderstorm': '⛈️',
                'Snow': '❄️',
                'Mist': '🌫️',
                'Smoke': '💨',
                'Haze': '🌫️',
                'Dust': '🌪️',
                'Fog': '🌫️',
                'Sand': '🌪️',
                'Ash': '💨',
                'Squall': '💨',
                'Tornado': '🌪️'
            };
            return weatherEmojis[weatherType] || '🌤️';
        }

        function showLoading() {
            document.getElementById('content').innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Loading weather data...</p>
                </div>
            `;
        }

        function showError(message) {
            document.getElementById('content').innerHTML = `
                <div class="error-message">
                    <strong>⚠️ Error:</strong> ${message}
                </div>
            `;
        }

        function addToFavorites(city, country) {
            const favorite = `${city}, ${country}`;
            if (!favorites.includes(favorite)) {
                favorites.push(favorite);
                localStorage.setItem('weatherFavorites', JSON.stringify(favorites));
                updateFavorites();
                alert(`${favorite} added to favorites!`);
            } else {
                alert(`${favorite} is already in your favorites!`);
            }
        }

        function updateFavorites() {
            const container = document.getElementById('favoritesContainer');
            const buttonsDiv = document.getElementById('favoriteButtons');

            if (favorites.length > 0) {
                container.style.display = 'block';
                buttonsDiv.innerHTML = favorites.map(fav => `
                    <button class="favorite-btn" onclick="searchWeatherByCity('${fav.split(',')[0]}')">${fav}</button>
                `).join('') + `
                    <button class="favorite-btn" onclick="clearFavorites()" style="background: #ff6b6b; border-color: #ff6b6b;">Clear All</button>
                `;
            } else {
                container.style.display = 'none';
            }
        }

        function clearFavorites() {
            if (confirm('Are you sure you want to clear all favorites?')) {
                favorites = [];
                localStorage.setItem('weatherFavorites', JSON.stringify(favorites));
                updateFavorites();
            }
        }
    </script>
</body>
</html>
